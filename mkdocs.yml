site_name: Gonka Docs
site_url: https://daniil-zotov.github.io/gonkadocs/
repo_url: https://github.com/Daniil-Zotov/gonkadocs
repo_name: Daniil-Zotov/gonkadocs
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: _site

# Раздел "Gonka" (docs/gonka/docs/**) собирается ОТДЕЛЬНО родным mkdocs.yml
# оригинала (gonka-ai/gonka-docs) в подкаталог _site/gonka/ через
# buildtools/build.sh. Поэтому исключаем его из основной сборки, чтобы не
# дублировать контент и не ловить "not in nav" предупреждения.
exclude_docs: |
  gonka/docs/

# Отдельные посты обсуждений и страницы community доступны по ссылкам из
# индексных страниц, но намеренно не входят в nav-меню напрямую.
not_in_nav: |
  gonka/discussion/**/*.md
  community/**/*.md
  README.md

nav:
  - Главная: index.md
  - Gonka: "/gonkadocs/gonka/docs/"
  - Обсуждения:
    - Обзор: gonka/discussion/index.md
    - Announcements: gonka/discussion/announcements/index.md
    - General: gonka/discussion/general/index.md
    - Proposals: gonka/discussion/proposals/index.md
    - Q&A: gonka/discussion/q-a/index.md
    - Show and Tell: gonka/discussion/show-and-tell/index.md
  - Сообщество:
    - Обзор: community/README.md
    - Дорожная карта: community/roadmap/gonka-network-development-roadmap.md
    - GRC: community/grc/README.md
    - GSC: community/gsc/regulation.md
  - Proposals: proposals/README.md

theme:
  name: material
  custom_dir: docs/overrides   
  language: ru
  logo: images/01-favicon.png      # логотип в шапке (опционально)
  favicon: images/01-favicon.png   # ← это favicon
  font:
    text: -apple-system
    code: ui-monospace
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.comments
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: octicons/moon-16
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: octicons/sun-16
        name: Светлая тема
  icon:
    repo: fontawesome/brands/github
    edit: octicons/pencil-16
    view: octicons/eye-16
    admonition:
      note: octicons/info-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/light-bulb-16
      success: octicons/check-circle-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/stop-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

extra_css:
  - stylesheets/github.css

plugins:
  - search:
      lang:
        - ru
        - en

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret

extra:
  comments: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Daniil-Zotov/gonkadocs

validation:
  omitted_files: warn
  absolute_links: ignore        # absolute_links - это те самые "/governance/..." из апстрима
  unrecognized_links: info
  anchors: info                 # битые якоря (#section) - только info, не warn
