name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Install dependencies (основной сайт)
        run: |
          pip install \
            "mkdocs>=1.6" \
            mkdocs-material \
            pymdown-extensions

      - name: Install dependencies (раздел Gonka — из синканутого оригинала)
        # Раздел Gonka собирается родным mkdocs.yml оригинала
        # (gonka-ai/gonka-docs), поэтому ставим ИМЕННО его зависимости из
        # синканутых файлов. Так сборка остаётся устойчивой к изменениям стека
        # оригинала: обновился их requirements.txt — обновятся и наши зависимости.
        run: |
          if [ -f docs/gonka/docs/buildtools/requirements.txt ]; then
            pip install -r docs/gonka/docs/buildtools/requirements.txt
          else
            # Фолбэк: минимально необходимый набор плагинов оригинала.
            pip install \
              mkdocs-static-i18n \
              mkdocs-minify-plugin \
              mkdocs-redirects \
              mkdocs-video \
              mkdocs-macros-plugin \
              mkdocs-git-revision-date-localized-plugin
          fi
          # Локальный ps-plugin оригинала (если присутствует в синке).
          if [ -d docs/gonka/docs/ps-plugin ]; then
            pip install -e docs/gonka/docs/ps-plugin
          fi

      - name: Build site (основной сайт + раздел Gonka)
        run: bash buildtools/build.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
